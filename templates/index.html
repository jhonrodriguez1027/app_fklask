<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicción de Grupo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            max-width:600px;
            margin:auto;
            margin-top:40px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,.1);
        }

        .titulo{
            color:#0d6efd;
            font-weight:bold;
        }

        .resultado{
            font-size:20px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-4">

        <h1 class="text-center titulo">My Flask App</h1>

        <p class="text-center text-muted">
            Ingresa los datos de ingresos y gastos para calcular el grupo al que pertenece el cliente.
        </p>

        <form action="/predict" method="POST">

            <div class="mb-3">
                <label class="form-label">
                    <strong>Ingresos Mensuales</strong>
                </label>

                <input
                    type="number"
                    class="form-control"
                    name="ingresos"
                    placeholder="Ej. 3500"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <strong>Gastos Mensuales</strong>
                </label>

                <input
                    type="number"
                    class="form-control"
                    name="gastos"
                    placeholder="Ej. 2000"
                    required>
            </div>

            <button class="btn btn-primary w-100">
                Predecir Grupo
            </button>

        </form>

        {% if prediccion %}
        <div class="alert alert-success mt-4 text-center">
            <div class="resultado">
                {{ prediccion }}
            </div>
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
